name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npx nx run-many -t lint --projects=@nestjs-live-configs/core,@nestjs-live-configs/adapter-sqlite,@nestjs-live-configs/adapter-redis,@nestjs-live-configs/adapter-postgres,@nestjs-live-configs/adapter-mongo,@nestjs-live-configs/demo-app

      - name: Typecheck
        run: npx nx run-many -t typecheck --projects=@nestjs-live-configs/core,@nestjs-live-configs/adapter-sqlite,@nestjs-live-configs/adapter-redis,@nestjs-live-configs/adapter-postgres,@nestjs-live-configs/adapter-mongo,@nestjs-live-configs/demo-app

      - name: Build
        run: npx nx run-many -t build --projects=@nestjs-live-configs/core,@nestjs-live-configs/adapter-sqlite,@nestjs-live-configs/adapter-redis,@nestjs-live-configs/adapter-postgres,@nestjs-live-configs/adapter-mongo

      - name: Run unit tests
        run: npx nx test @nestjs-live-configs/core

  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        driver:
          - sqlite
          - redis
          - postgres
          - mongo
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: live_config
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d live_config"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand({ ping: 1 }).ok' | mongosh localhost:27017/test --quiet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      REDIS_URL: redis://localhost:6379
      POSTGRES_URL: postgres://postgres:postgres@localhost:5432/live_config
      MONGODB_URL: mongodb://localhost:27017/live_config
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests for ${{ matrix.driver }}
        run: |
          case "${{ matrix.driver }}" in
            sqlite)
              npx nx test @nestjs-live-configs/adapter-sqlite
              ;;
            redis)
              npx nx test @nestjs-live-configs/adapter-redis
              ;;
            postgres)
              npx nx test @nestjs-live-configs/adapter-postgres
              ;;
            mongo)
              npx nx test @nestjs-live-configs/adapter-mongo
              ;;
          esac
