name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build packages
        run: npm run build

      - name: Version release packages
        uses: changesets/action@v1
        with:
          version: npm run version:packages
          commit: 'chore: release package versions'
          title: 'chore: release package versions'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
